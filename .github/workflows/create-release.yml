name: Publish a new release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Run Tests
        run: ./gradlew build

  build-jar:
    needs: build-and-test
    runs-on: [ windows-latest ]
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      - name: Build with Gradle
        run: .\gradlew.bat dist --no-daemon
      - name: Get Tag name
        uses: olegtarasov/get-tag@v2.1
        id: tagName
        with:
          tagRegex: "v(.*)"
          tagRegexGroup: 1
      - name: Create Distribution
        run: .\scripts\build\create-distribution-jar.bat ${{ steps.tagName.outputs.tag }}
      - uses: AButler/upload-release-assets@v3.0
        with:
          files: './scripts/build/freerouting-${{ steps.tagName.outputs.tag }}.jar'
          release-tag: v${{ steps.tagName.outputs.tag }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  build-ubuntu-x64:
    needs: build-and-test
    runs-on: [ ubuntu-latest ]
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Grant execute permission for build scripts
        run: chmod +x scripts/build/*.sh
      - name: Build with Gradle
        run: ./gradlew dist
      - name: Get Tag name
        uses: olegtarasov/get-tag@v2.1
        id: tagName
        with:
          tagRegex: "v(.*)"
          tagRegexGroup: 1
      - name: Create Distribution
        run: scripts/build/create-distribution-linux-x64.sh ${{ steps.tagName.outputs.tag }}
      - uses: AButler/upload-release-assets@v3.0
        with:
          files: './scripts/build/freerouting-${{ steps.tagName.outputs.tag }}-linux-x64.zip'
          release-tag: v${{ steps.tagName.outputs.tag }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  build-windows-x64:
    needs: build-and-test
    runs-on: [ windows-latest ]
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      - name: Build with Gradle
        run: .\gradlew.bat dist --no-daemon
      - name: Get Tag name
        uses: olegtarasov/get-tag@v2.1
        id: tagName
        with:
          tagRegex: "v(.*)"
          tagRegexGroup: 1
      - name: Create Distribution
        run: .\scripts\build\create-distribution-windows-x64.bat ${{ steps.tagName.outputs.tag }}
      - uses: AButler/upload-release-assets@v3.0
        with:
          files: './scripts/build/freerouting-${{ steps.tagName.outputs.tag }}-windows-x64.msi'
          release-tag: v${{ steps.tagName.outputs.tag }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    needs: build-and-test
    runs-on: [ macos-latest ]
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Grant execute permission for build scripts
        run: chmod +x scripts/build/*.sh
      - name: Build with Gradle
        run: ./gradlew dist
      - name: Get Tag name
        uses: olegtarasov/get-tag@v2.1
        id: tagName
        with:
          tagRegex: "v(.*)"
          tagRegexGroup: 1
      - name: Create Distribution
        run: scripts/build/create-distribution-macos-arm64.sh ${{ steps.tagName.outputs.tag }}
      - uses: AButler/upload-release-assets@v3.0
        with:
          files: './scripts/build/freerouting-${{ steps.tagName.outputs.tag }}-macos-arm64.dmg'
          release-tag: v${{ steps.tagName.outputs.tag }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}