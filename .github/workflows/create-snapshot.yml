name: Update the snapshot build

on:
  push:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Run Tests
        run: ./gradlew build

  delete-old-snapshot-assets:

    runs-on: [ ubuntu-latest ]

    steps:
      - uses: actions/checkout@v4
      - name: Delete old SNAPSHOT assets
        uses: mknejp/delete-release-assets@v1
        with:
          fail-if-no-assets: false
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: SNAPSHOT
          assets: |
            freerouting-SNAPSHOT.zip
            freerouting-SNAPSHOT.tar.gz
            freerouting-SNAPSHOT-*.*   

  build-jar:

    needs: delete-old-snapshot-assets

    runs-on: [ windows-latest ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '25'
          cache: 'gradle'
      - name: Build with Gradle
        run: .\gradlew.bat dist --no-daemon
      - name: Create Distribution
        run: .\scripts\build\create-distribution-jar.bat "SNAPSHOT-$(([datetime]::now).tostring('yyyyMMdd_HHmm00'))"
      - uses: AButler/upload-release-assets@v3.0
        with:
          files: './scripts/build/freerouting-SNAPSHOT-*.jar'
          release-tag: SNAPSHOT
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  build-ubuntu-x64:

    needs: delete-old-snapshot-assets

    runs-on: [ ubuntu-latest ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '25'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Grant execute permission for build scripts
        run: chmod +x scripts/build/*.sh
      - name: Build with Gradle
        run: ./gradlew dist
      - name: Create Distribution
        run: scripts/build/create-distribution-SNAPSHOT-linux-x64.sh SNAPSHOT-$(date +"%Y%m%d_%H%M00")
      - uses: AButler/upload-release-assets@v3.0
        with:
          files: './scripts/build/freerouting-SNAPSHOT-*-linux-x64.zip'
          release-tag: SNAPSHOT
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  build-windows-x64:

    needs: delete-old-snapshot-assets

    runs-on: [ windows-latest ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '25'
          cache: 'gradle'
      - name: Build with Gradle
        run: .\gradlew.bat dist --no-daemon
      - name: Create Distribution
        run: .\scripts\build\create-distribution-SNAPSHOT-windows-x64.bat "SNAPSHOT-$(([datetime]::now).tostring("yyyyMMdd_HHmm00"))"
      - uses: AButler/upload-release-assets@v3.0
        with:
          files: './scripts/build/freerouting-SNAPSHOT-*-windows-x64.msi'
          release-tag: SNAPSHOT
          repo-token: ${{ secrets.GITHUB_TOKEN }}


  build-macos-arm64:

    needs: delete-old-snapshot-assets

    runs-on: [ macos-latest ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '25'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Grant execute permission for build scripts
        run: chmod +x scripts/build/*.sh
      - name: Build with Gradle
        run: ./gradlew dist
      - name: Create Distribution
        run: scripts/build/create-distribution-SNAPSHOT-macos-arm64.sh SNAPSHOT-$(date +"%Y%m%d_%H%M00") "${{ secrets.APPLE_DEVELOPER_ID }}"
      - uses: AButler/upload-release-assets@v3.0
        with:
          files: './scripts/build/freerouting-SNAPSHOT-*-macos-arm64.dmg'
          release-tag: SNAPSHOT
          repo-token: ${{ secrets.GITHUB_TOKEN }}
