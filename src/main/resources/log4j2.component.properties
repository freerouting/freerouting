log4j2.configurationFactory=app.freerouting.logger.Log4j2ConfigurationFactory

# Disable JNDI lookups — Freerouting does not use them.
# The java.naming module is intentionally excluded from the jlink runtime (see AGENTS.md).
# Setting this property here (rather than in main()) ensures it is read during Log4j2's
# static initialisation, before any plugin scanning occurs.
# Note: the executableJar build task also excludes JndiLookup.class from the fat jar, which
# is the primary guard. This property is a belt-and-suspenders for bare-jar deployments.
log4j2.disableJndi=true
log4j2.enableJndiLookup=false


