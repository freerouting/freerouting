allow_telemetry=<html><strong>Freerouting উন্নত করতে সাহায্য করুন</strong> — রোগনির্ণয় ও ব্যবহারের ডেটা পাঠিয়ে। এই ডেটা বেনামী এবং কার্যক্ষমতা উন্নত করতে, সমস্যা সমাধান করতে ও নতুন ফিচার তৈরিতে সহায়তা করে।</html>
