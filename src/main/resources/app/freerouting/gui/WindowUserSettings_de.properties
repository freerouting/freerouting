sponsor_message=<html><strong>Vielen Dank, dass Sie Freerouting verwenden!</strong><br><br>Wenn Sie das Projekt unterstützen und mir helfen möchten, daran weiterzuarbeiten, erwägen Sie bitte, mich zu sponsern. Jede Form der Unterstützung bedeutet mir viel – sogar eine kleine monatliche Spende wird sehr geschätzt!<br><br>Sie können auch meine Leidenschaft entfachen und mich inspirieren, weiterzumachen, indem Sie Ihre <strong>Erfolgsgeschichten</strong> mit Freerouting teilen – ich würde gerne hören, wie es Ihrem Projekt geholfen hat. Senden Sie sie an <a href="mailto:info@freerouting.app">info@freerouting.app</a> – ich freue mich, jede einzelne zu lesen!</html>
