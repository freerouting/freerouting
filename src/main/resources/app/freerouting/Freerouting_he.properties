command_line_help=USAGE\n\n  freerouting [PARAMETERS]\n\nפרמטרים\n\n  -de <design.dsn>\n      טוען קובץ Specctra בפורמט .dsn\n\n  -di <design_directory>\n      מגדיר את תיקיית ברירת המחדל לתיבות הדו-שיח לפתיחת תכנון\n\n  -dr <design_rules_file>\n      קורא קובץ כללים בפורמט .rules\n\n  -do <output_file>\n      שומר בסיום את הלוח (.dsn), את הסשן (.ses) או\n      את סקריפט הסשן של Eagle (.scr)\n\n  -mp <number_of_passes>\n      מגדיר את הגבול העליון למספר מעברי ה-autorouter\n      שיבוצעו\n\n  -l  <language>\n      "en" לאנגלית, "de" לגרמנית, "zh" לסינית מפושטת, "he" לעברית; אחרת תיבחר שפת המערכת. לשפות לא נתמכות תיבחר אנגלית כברירת מחדל.\n\n  -mt <number_of_threads>\n      מגדיר את גודל מאגר התהליכונים לאופטימיזציית ניתוב. ברירת המחדל היא\n      אחד פחות ממספר המעבדים הלוגיים במערכת.\n\n  -us <updating_stratedy>\n      Greedy, Global, Hybrid. מגדיר את אסטרטגיית עדכון הלוח\n      לאופטימיזציית ניתוב. ברירת המחדל היא Greedy. כאשר נבחר Hybrid,\n      האפשרות "hr" מגדירה את היחס ההיברידי.\n\n  -hr <m\:n>\n      מגדיר יחס היברידי בפורמט\n      \#_global_optiomal_passes\:\#_prioritized_passes.\n      ברירת המחדל היא 1\:1. הערך רלוונטי רק כאשר\n      נבחרת אסטרטגיית Hybrid.\n\n  -is <selection_strategy>\n      Sequential, random, או prioritized. מגדיר אסטרטגיית בחירת פריטים\n      לאופטימיזציית ניתוב\: sequential, random, prioritized.\n      ברירת המחדל היא prioritized. אסטרטגיית prioritized בוחרת פריטים\n      לפי ציונים שחושבו בסבב הקודם.\n\n  -h מציג עזרה זו\n